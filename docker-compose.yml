
services:
  db:
    image: postgres:15-alpine
    container_name: pwms_postgres
    environment:
      POSTGRES_USER: pharma_admin
      POSTGRES_PASSWORD: pharma_secret_123
      POSTGRES_DB: wms_pharma_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pwms_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
